<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="560" fill="#fafafa"/>
  <rect x="25" y="25" width="1150" height="510" rx="18" fill="#ffffff" stroke="#222" stroke-width="4"/>

  <text x="60" y="80" font-family="Comic Sans MS, Arial" font-size="34" fill="#111">
    Whiteboard: Reverse a Singly Linked List
  </text>

  <line x1="60" y1="105" x2="1130" y2="105" stroke="#111" stroke-width="3"/>

  <text x="70" y="160" font-family="Comic Sans MS, Arial" font-size="30" fill="#111">
    Original:
  </text>

  <g font-family="Comic Sans MS, Arial" font-size="28" fill="#111" stroke="#111" stroke-width="3">
    <rect x="220" y="130" width="80" height="55" rx="8" fill="#fff"/>
    <rect x="360" y="130" width="80" height="55" rx="8" fill="#fff"/>
    <rect x="500" y="130" width="80" height="55" rx="8" fill="#fff"/>
    <rect x="640" y="130" width="80" height="55" rx="8" fill="#fff"/>
    <rect x="780" y="130" width="80" height="55" rx="8" fill="#fff"/>

    <text x="250" y="167" stroke="none">1</text>
    <text x="390" y="167" stroke="none">2</text>
    <text x="530" y="167" stroke="none">3</text>
    <text x="670" y="167" stroke="none">4</text>
    <text x="810" y="167" stroke="none">5</text>

    <line x1="300" y1="158" x2="360" y2="158"/>
    <line x1="440" y1="158" x2="500" y2="158"/>
    <line x1="580" y1="158" x2="640" y2="158"/>
    <line x1="720" y1="158" x2="780" y2="158"/>

    <text x="900" y="167" stroke="none">null</text>
    <line x1="860" y1="158" x2="900" y2="158"/>
  </g>

  <text x="70" y="285" font-family="Comic Sans MS, Arial" font-size="30" fill="#111">
    Pointer Strategy:
  </text>

  <g font-family="Comic Sans MS, Arial" font-size="28">
    <text x="220" y="285" fill="#0078D4">prev</text>
    <text x="420" y="285" fill="#E63946">curr</text>
    <text x="620" y="285" fill="#2A9D8F">next</text>
  </g>

  <g stroke-width="4" fill="none">
    <path d="M245 295 C230 340, 260 355, 300 360" stroke="#0078D4"/>
    <path d="M445 295 C430 340, 470 355, 500 360" stroke="#E63946"/>
    <path d="M645 295 C630 340, 670 355, 700 360" stroke="#2A9D8F"/>
  </g>

  <text x="70" y="410" font-family="Comic Sans MS, Arial" font-size="30" fill="#111">
    Reversed:
  </text>

  <g font-family="Comic Sans MS, Arial" font-size="28" fill="#111" stroke="#111" stroke-width="3">
    <rect x="220" y="380" width="80" height="55" rx="8" fill="#fff"/>
    <rect x="360" y="380" width="80" height="55" rx="8" fill="#fff"/>
    <rect x="500" y="380" width="80" height="55" rx="8" fill="#fff"/>
    <rect x="640" y="380" width="80" height="55" rx="8" fill="#fff"/>
    <rect x="780" y="380" width="80" height="55" rx="8" fill="#fff"/>

    <text x="250" y="417" stroke="none">5</text>
    <text x="390" y="417" stroke="none">4</text>
    <text x="530" y="417" stroke="none">3</text>
    <text x="670" y="417" stroke="none">2</text>
    <text x="810" y="417" stroke="none">1</text>

    <line x1="300" y1="408" x2="360" y2="408"/>
    <line x1="440" y1="408" x2="500" y2="408"/>
    <line x1="580" y1="408" x2="640" y2="408"/>
    <line x1="720" y1="408" x2="780" y2="408"/>

    <text x="900" y="417" stroke="none">null</text>
    <line x1="860" y1="408" x2="900" y2="408"/>
  </g>

  <text x="70" y="500" font-family="Comic Sans MS, Arial" font-size="26" fill="#444">
    Save next, reverse current.Next, move prev and curr forward.
  </text>
</svg>